server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed static assets — safe for long-term immutable cache
    location ~* "\.[0-9a-f]{8,}\.(?:css|js|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML, JSON (i18n, config), and unhashed assets — must revalidate
    location ~* "\.(?:html|json)$" {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Other static assets without hashes (fonts, images referenced directly)
    location ~* "\.(?:css|js|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico)$" {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
}
